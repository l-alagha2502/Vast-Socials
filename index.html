<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vast™ | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #000000; /* Pure Black background */
            color: #ffffff; /* White text */
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 1. Header & Navbar Layout */
        .site-header {
            width: 90%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
        }

        .nav-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ffffff;
            object-fit: contain;
            padding: 5px;
        }

        .nav-bar-circular {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 20px;
            border-radius: 50px; /* Circular pill shape */
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        .nav-bar-circular a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 50px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        /* Circular box effect on hover */
        .nav-bar-circular a:hover {
            border: 1px solid #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-bar-circular a.active {
            background: #ffffff;
            color: #000000;
        }

        /* 2. Energy Badge Section */
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
            text-align: center;
        }

        .energy-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px; /* Circular box */
            background: transparent;
            margin-bottom: 30px;
        }

        .bolt {
            font-size: 1.2rem;
            color: #ffffff;
        }

        .badge-text {
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -2px;
        }

        .subtext {
            color: #94a3b8;
            max-width: 450px;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-left">
            <img src="logo.png" alt="Vast Logo" class="nav-logo">
        </div>
        
        <nav class="nav-bar-circular">
            <a href="index.html" class="active">Home</a>
            <a href="vision.html">Vision</a>
            <a href="about.html">About</a>
            <a href="community.html">Community</a>
        </nav>
    </header>

    <main class="hero-section">
        <div class="energy-badge">
            <span class="bolt">⚡</span>
            <span class="badge-text">Breaking The Cycle</span>
        </div>

        <h1>Vast™</h1>
        <p class="subtext">Empowering youth to break the cycle of wasted potential and build an endless future.</p>
    </main>

</body>
</html>
