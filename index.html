<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vast™ Socials</title>
    <style>
        body {
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .logo { 
            width: 140px; /* Increased from 100px */
            height: 140px; 
            border-radius: 50%; 
            background: white; 
            margin-bottom: 25px; 
            display: inline-block; 
            object-fit: contain; /* Ensures logo isn't cut off */
            padding: 5px; /* Creates a small white border around the logo */
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2); /* Soft blue glow around logo */
        }
        h1 { 
            font-size: 2rem; 
            margin-bottom: 10px; 
            letter-spacing: -0.5px;
            font-weight: 800;
        }
        p { 
            color: #94a3b8; 
            margin-bottom: 40px; 
            font-size: 1.1rem; 
            line-height: 1.5;
            max-width: 300px; /* Keeps text centered and readable */
            margin-left: auto;
            margin-right: auto;
        }
        .link {
            display: block;
            background: rgba(255, 255, 255, 0.05); /* Semi-transparent glass look */
            color: white;
            text-decoration: none;
            padding: 16px;
            margin: 12px 0;
            border-radius: 12px; /* Smoother corners */
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px); /* Trendy "Glassmorphism" effect */
        }

        .link:hover {
            background: #38bdf8; /* Bright Cyan */
            color: #020617; /* Dark text for contrast */
            border-color: #7dd3fc;
            transform: translateY(-3px); /* Lifts the button up slightly */
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3); /* Blue glow */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Vast Logo" class="logo">
        <h1>Vast™</h1> <p>Empowering youth to break the cycle of wasted potential.</p>

        <a href="mailto:vastyouth.org@gmail.com?subject=Inquiry about Vast™" class="link">Email Us</a>
        <a href="https://discord.gg/AXSfnbHTzY" class="link">Join our Discord Community</a>
        <a href="https://wa.me/97433820466" class="link">Message Us</a>
    </div>

</body>
</html>
